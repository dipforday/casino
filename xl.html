<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Рулетка — Денежный подарок</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 30% 20%, #1e3c2c, #0a1f12);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Roboto', sans-serif;
            padding: 16px;
        }

        /* Основной контейнер — только заголовок и колесо */
        .roulette-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 650px;
        }

        /* Заголовок */
        .title {
            text-align: center;
            font-size: clamp(1.6rem, 8vw, 2.4rem);
            font-weight: 800;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #FFECB3, #FFC107, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 6px rgba(0,0,0,0.3);
            letter-spacing: 1px;
            padding: 0 10px;
            word-break: keep-all;
        }

        .wheel-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 50%;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5), 0 0 0 8px #F7D44A, 0 0 0 14px #B87C2E;
            cursor: pointer;
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
            transition: transform 0.05s ease;
        }
        canvas:active {
            transform: scale(0.98);
        }

        .pointer {
            position: absolute;
            top: -28px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 28px solid transparent;
            border-right: 28px solid transparent;
            border-top: 58px solid #FFD966;
            filter: drop-shadow(0 6px 10px rgba(0,0,0,0.5));
            z-index: 15;
            pointer-events: none;
        }
        .pointer::before {
            content: "💎";
            position: absolute;
            top: -66px;
            left: -22px;
            font-size: 34px;
            color: #fff3b0;
            text-shadow: 0 0 5px gold;
        }

        @media (max-width: 550px) {
            .pointer { top: -22px; border-left: 22px solid transparent; border-right: 22px solid transparent; border-top: 46px solid #FFD966; }
            .pointer::before { font-size: 26px; top: -52px; left: -18px; }
        }
    </style>
</head>
<body>
<div class="roulette-container">
    <div class="title">Сколько тебе подарю денег?</div>
    <div class="wheel-wrapper">
        <canvas id="wheelCanvas" width="600" height="600"></canvas>
        <div class="pointer"></div>
    </div>
</div>

<script>
    (function() {
        // -------- НАСТРОЙКИ РУЛЕТКИ ----------
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        
        const SIZE = 600;
        const CENTER = SIZE / 2;
        const RADIUS = 260;
        const TEXT_RADIUS = 200;
        
        // Сектора: 1000, 2000, 3000, 4000, 5000
        const VALUES = [1000, 2000, 3000, 4000, 5000];
        const SEG_COUNT = VALUES.length;
        const ANGLE_STEP = (Math.PI * 2) / SEG_COUNT;   // 72°
        
        const COLORS = [
            "#FFB7B2",   // 1000
            "#B5E3D5",   // 2000
            "#FFE2A4",   // 3000
            "#E0C5F0",   // 4000
            "#FFD966"    // 5000
        ];
        
        // Угол указателя (сверху) в радианах
        const POINTER_ANGLE = -Math.PI / 2;
        
        // Получить угол поворота колеса, чтобы указатель смотрел на середину сектора sectorIndex
        function getRotationForSector(sectorIndex) {
            const midSectorAngle = sectorIndex * ANGLE_STEP + ANGLE_STEP / 2;
            let rot = POINTER_ANGLE - midSectorAngle;
            // нормализуем в диапазон (-PI, PI]
            rot = ((rot % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
            if (rot > Math.PI) rot -= 2*Math.PI;
            return rot;
        }
        
        // Предвычисленные углы для каждого сектора
        const SECTOR_ROTATIONS = VALUES.map((_, idx) => getRotationForSector(idx));
        
        // ---------- ЛОГИКА ЗАПОМИНАНИЯ УСТРОЙСТВА (localStorage) ----------
        const STORAGE_KEY = 'roulette_has_spun_before';
        
        function hasSpunBefore() {
            return localStorage.getItem(STORAGE_KEY) === 'true';
        }
        
        function markAsSpun() {
            localStorage.setItem(STORAGE_KEY, 'true');
        }
        
        // Определяем, должен ли текущий спин быть гарантированным 5000
        let isGuaranteedFirstSpin = !hasSpunBefore();
        
        // Состояние анимации
        let currentRotation = SECTOR_ROTATIONS[4];   // изначально стоит на 5000 (просто визуально)
        let isAnimating = false;
        let animFrame = null;
        
        // Форматирование денег
        function formatMoney(val) {
            return val.toLocaleString('ru-RU') + ' ₽';
        }
        
        // Отрисовка колеса
        function drawWheel(rotationRad) {
            ctx.clearRect(0, 0, SIZE, SIZE);
            ctx.save();
            ctx.translate(CENTER, CENTER);
            ctx.rotate(rotationRad);
            
            for (let i = 0; i < SEG_COUNT; i++) {
                const start = i * ANGLE_STEP;
                const end = (i + 1) * ANGLE_STEP;
                const value = VALUES[i];
                
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, RADIUS, start, end);
                ctx.closePath();
                ctx.fillStyle = COLORS[i];
                ctx.fill();
                ctx.strokeStyle = "#FFEAA0";
                ctx.lineWidth = 2.2;
                ctx.stroke();
                
                const mid = start + ANGLE_STEP / 2;
                const xTxt = Math.cos(mid) * TEXT_RADIUS;
                const yTxt = Math.sin(mid) * TEXT_RADIUS;
                ctx.font = `bold ${value === 5000 ? '30px' : '26px'} "Segoe UI", "Poppins", system-ui`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.shadowBlur = 0;
                ctx.fillStyle = "#FFFBE6";
                ctx.fillText(formatMoney(value), xTxt-1, yTxt-1);
                ctx.fillStyle = value === 5000 ? "#6B3A00" : "#2C1E12";
                ctx.fillText(formatMoney(value), xTxt, yTxt);
            }
            ctx.restore();
            
            // Центр колеса (декор)
            ctx.save();
            ctx.beginPath();
            ctx.arc(CENTER, CENTER, 42, 0, 2*Math.PI);
            ctx.fillStyle = "#F7D44A";
            ctx.shadowBlur = 10;
            ctx.shadowColor = "rgba(0,0,0,0.6)";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(CENTER, CENTER, 30, 0, 2*Math.PI);
            ctx.fillStyle = "#F3B33D";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(CENTER, CENTER, 18, 0, 2*Math.PI);
            ctx.fillStyle = "#E69500";
            ctx.fill();
            ctx.fillStyle = "#FFDD88";
            ctx.font = "bold 28px 'Segoe UI'";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("💰", CENTER, CENTER+2);
            ctx.beginPath();
            ctx.arc(CENTER-45, CENTER-42, 16, 0, 2*Math.PI);
            ctx.fillStyle = "rgba(255,245,180,0.45)";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(CENTER+40, CENTER-35, 12, 0, 2*Math.PI);
            ctx.fillStyle = "rgba(255,235,150,0.5)";
            ctx.fill();
            ctx.restore();
        }
        
        // Генерация случайного выигрыша (все суммы равновероятны)
        function getRandomWin() {
            const randomIndex = Math.floor(Math.random() * VALUES.length);
            return VALUES[randomIndex];
        }
        
        // Определяем сумму для текущего вращения
        function getCurrentWinAmount() {
            if (isGuaranteedFirstSpin) {
                return 5000;
            } else {
                return getRandomWin();
            }
        }
        
        function getSectorIndexByValue(value) {
            return VALUES.indexOf(value);
        }
        
        // Всплывающее уведомление (тост)
        function showToast(message, isWin = true) {
            const toast = document.createElement('div');
            toast.innerText = message;
            toast.style.position = 'fixed';
            toast.style.bottom = '15%';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.backgroundColor = isWin ? 'rgba(0,0,0,0.85)' : 'rgba(0,0,0,0.7)';
            toast.style.color = '#FFE484';
            toast.style.fontSize = 'clamp(1rem, 5vw, 1.5rem)';
            toast.style.fontWeight = 'bold';
            toast.style.padding = '10px 20px';
            toast.style.borderRadius = '50px';
            toast.style.backdropFilter = 'blur(8px)';
            toast.style.border = isWin ? '1px solid #FFD966' : 'none';
            toast.style.whiteSpace = 'nowrap';
            toast.style.zIndex = '10000';
            toast.style.fontFamily = 'inherit';
            toast.style.textShadow = '0 1px 2px black';
            toast.style.boxShadow = '0 4px 15px rgba(0,0,0,0.3)';
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 2200);
        }
        
        // Конфетти эффект
        function launchConfetti() {
            const colors = ['#FFD966', '#FFB347', '#F4C542', '#FF8C42', '#6ED4B0', '#FFE484', '#FF6B6B'];
            const count = 150;
            for (let i = 0; i < count; i++) {
                const conf = document.createElement('div');
                conf.style.position = 'fixed';
                conf.style.width = Math.random() * 12 + 5 + 'px';
                conf.style.height = Math.random() * 12 + 5 + 'px';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.left = Math.random() * window.innerWidth + 'px';
                conf.style.top = '-40px';
                conf.style.borderRadius = Math.random() > 0.6 ? '50%' : '2px';
                conf.style.opacity = '0.95';
                conf.style.zIndex = '9999';
                conf.style.pointerEvents = 'none';
                document.body.appendChild(conf);
                const xShift = (Math.random() - 0.5) * 280;
                const dur = 900 + Math.random() * 1300;
                conf.animate([
                    { transform: `translate(0, 0) rotate(0deg)`, opacity: 1 },
                    { transform: `translate(${xShift}px, ${window.innerHeight + 150}px) rotate(${Math.random() * 720}deg)`, opacity: 0.2 }
                ], { duration: dur, easing: 'cubic-bezier(0.2,0.8,0.4,1)' });
                setTimeout(() => conf.remove(), dur + 200);
            }
        }
        
        // Основная анимация вращения (длительность 10-20 секунд)
        function startSpin() {
            if (isAnimating) return;
            
            const winAmount = getCurrentWinAmount();
            const targetSectorIndex = getSectorIndexByValue(winAmount);
            const targetRotationBase = SECTOR_ROTATIONS[targetSectorIndex];
            const isFirstSpinNow = isGuaranteedFirstSpin;
            
            isAnimating = true;
            
            const startRot = currentRotation;
            const fullTurns = 8 + Math.floor(Math.random() * 9); // 8..16 оборотов
            let deltaRaw = targetRotationBase - startRot;
            let normDelta = ((deltaRaw % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
            if (normDelta > Math.PI) normDelta -= 2*Math.PI;
            const targetEnd = startRot + normDelta + fullTurns * 2 * Math.PI;
            
            const duration = 10000 + Math.random() * 40000; // 10-20 сек
            const startTime = performance.now();
            
            function easeOutQuint(t) {
                return 1 - Math.pow(1 - t, 5);
            }
            
            function animate(now) {
                const elapsed = now - startTime;
                let t = Math.min(1, elapsed / duration);
                const eased = easeOutQuint(t);
                const newRot = startRot + (targetEnd - startRot) * eased;
                currentRotation = newRot;
                drawWheel(currentRotation);
                
                if (t < 1) {
                    animFrame = requestAnimationFrame(animate);
                } else {
                    currentRotation = targetRotationBase;
                    drawWheel(currentRotation);
                    isAnimating = false;
                    animFrame = null;
                    
                    if (isFirstSpinNow) {
                        markAsSpun();
                        isGuaranteedFirstSpin = false;
                        showToast(`🏆 ВЫ ВЫИГРАЛИ ${formatMoney(winAmount)} 🏆`, true);
                    } else {
                        showToast(`🏆 ВЫ ВЫИГРАЛИ ${formatMoney(winAmount)} 🏆`, true);
                    }
                    launchConfetti();
                }
            }
            
            if (animFrame) cancelAnimationFrame(animFrame);
            animFrame = requestAnimationFrame(animate);
        }
        
        function onWheelClick() {
            if (isAnimating) return;
            startSpin();
        }
        
        function setupCanvas() {
            canvas.width = SIZE;
            canvas.height = SIZE;
            canvas.style.width = '100%';
            canvas.style.height = 'auto';
            canvas.style.maxWidth = '600px';
            canvas.style.aspectRatio = '1 / 1';
            
            currentRotation = SECTOR_ROTATIONS[4];
            drawWheel(currentRotation);
            canvas.addEventListener('click', onWheelClick);
        }
        
        setupCanvas();
        window.addEventListener('resize', () => drawWheel(currentRotation));
    })();
</script>
</body>
</html>
